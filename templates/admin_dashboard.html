<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            height: 100vh;
            background: #2c3e50;
            color: white;
            padding: 20px;
        }

        .sidebar h2 {
            text-align: center;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            margin: 15px 0;
            padding: 10px;
            border-radius: 8px;
        }

        .sidebar a:hover {
            background: #34495e;
        }

        /* Main */
        .main {
            flex: 1;
            padding: 20px;
            background: #f4f6f9;
        }

        .cards {
            display: flex;
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            width: 200px;
            text-align: center;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .chart {
            width: 400px;
            margin-top: 30px;
        }
    </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>SmartFace</h2>
    <a href="/admin">Dashboard</a>
    <a href="/employees">Employees</a>
    <a href="/add_employee">Add Employee</a>
    <a href="/mark_attendance">Start Attendance</a>
    <a href="/logout">Logout</a>

</div>

<!-- Main Content -->
<div class="main">

<h1>Dashboard</h1>

<div class="cards">
    <div class="card">
        <h3>Total</h3>
        <p>{{total}}</p>
    </div>

    <div class="card">
        <h3>Present</h3>
        <p>{{present}}</p>
    </div>

    <div class="card">
        <h3>Absent</h3>
        <p>{{absent}}</p>
    </div>
</div>

<div class="chart">
    <canvas id="chart"></canvas>
</div>

<script>
new Chart(document.getElementById("chart"), {
    type: 'doughnut',
    data: {
        labels: ['Present', 'Absent'],
        datasets: [{
            data: [{{present}}, {{absent}}],
            backgroundColor: ['green', 'red']
        }]
    }
});
</script>

</div>

</body>
</html>
