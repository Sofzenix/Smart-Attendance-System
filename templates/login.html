{% extends 'base.html' %}
{% block title %}Login - SmartFace{% endblock %}

{% block auth_content %}
<div style="text-align: center; margin-bottom: 2rem;">
    <h1 style="font-size: 2rem; font-weight: 800; color: #fff; margin-bottom: 0.5rem;">Welcome Back</h1>
    <p style="color: var(--text-muted); font-size: 0.95rem;">Sign in to your intelligent face profile.</p>
</div>

<form method="POST">
    <div style="margin-bottom: 1.5rem;">
        <label style="display: block; font-size: 0.9rem; font-weight: 500; color: var(--text-muted); margin-bottom: 0.5rem;">Work Email</label>
        <input type="email" name="email" class="form-control" required placeholder="corporate@domain.com">
    </div>
    <div style="margin-bottom: 2rem;">
        <label style="display: block; font-size: 0.9rem; font-weight: 500; color: var(--text-muted); margin-bottom: 0.5rem;">Password</label>
        <input type="password" name="password" class="form-control" required placeholder="••••••••">
    </div>
    
    <button type="submit" class="btn-primary">Access Security Portal</button>
</form>

<div style="text-align: center; margin-top: 2rem;">
    <a href="{{ url_for('register') }}" style="color: var(--primary); font-size: 0.9rem; text-decoration: none; font-weight: 600;">Don't have an ID? Register Here</a>
</div>
{% endblock %}
