{% extends 'base.html' %}
{% block title %}Register - SmartFace{% endblock %}

{% block auth_content %}
<div style="text-align: center; margin-bottom: 2rem;">
    <h1 style="font-size: 2rem; font-weight: 800; color: #fff; margin-bottom: 0.5rem;">Create Profile</h1>
    <p style="color: var(--text-muted); font-size: 0.95rem;">Join the SmartFace attendance grid.</p>
</div>

<form method="POST">
    <div style="margin-bottom: 1rem;">
        <label style="display: block; font-size: 0.9rem; font-weight: 500; color: var(--text-muted); margin-bottom: 0.5rem;">Employee ID</label>
        <input type="text" name="employee_id" class="form-control" required placeholder="EMP001">
    </div>
    <div style="margin-bottom: 1rem;">
        <label style="display: block; font-size: 0.9rem; font-weight: 500; color: var(--text-muted); margin-bottom: 0.5rem;">Full Legal Name</label>
        <input type="text" name="name" class="form-control" required placeholder="John Doe">
    </div>
    <div style="margin-bottom: 1rem;">
        <label style="display: block; font-size: 0.9rem; font-weight: 500; color: var(--text-muted); margin-bottom: 0.5rem;">Work Email</label>
        <input type="email" name="email" class="form-control" required placeholder="john@domain.com">
    </div>
    <div style="margin-bottom: 1rem;">
        <label style="display: block; font-size: 0.9rem; font-weight: 500; color: var(--text-muted); margin-bottom: 0.5rem;">Phone Number</label>
        <input type="text" name="phone" class="form-control" required placeholder="+1 234 567 8900">
    </div>
    <div style="margin-bottom: 1rem;">
        <label style="display: block; font-size: 0.9rem; font-weight: 500; color: var(--text-muted); margin-bottom: 0.5rem;">Department</label>
        <select name="department" class="form-control" style="appearance: none;">
            <option value="IT" style="color: #000;">Engineering / IT</option>
            <option value="HR" style="color: #000;">Human Resources</option>
            <option value="Sales" style="color: #000;">Sales</option>
            <option value="Operations" style="color: #000;">Operations</option>
        </select>
    </div>
    <div style="margin-bottom: 2rem;">
        <label style="display: block; font-size: 0.9rem; font-weight: 500; color: var(--text-muted); margin-bottom: 0.5rem;">Secure Password</label>
        <input type="password" name="password" class="form-control" required placeholder="••••••••">
    </div>
    
    <button type="submit" class="btn-primary">Initialize Profile</button>
</form>

<div style="text-align: center; margin-top: 1.5rem;">
    <a href="{{ url_for('login') }}" style="color: var(--primary); font-size: 0.9rem; text-decoration: none; font-weight: 600;">Already registered? Login Here</a>
</div>
{% endblock %}
