<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartFace Attendance Scanner</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            background-color: #000;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            margin: 0;
        }
        .scanner-container {
            text-align: center;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .top-bar {
            padding: 1.5rem;
            position: absolute;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            z-index: 10;
        }
        .vid-wrapper {
            flex-grow: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
        }
        video {
            height: 100%;
            width: auto;
            max-width: 100vw;
            object-fit: cover;
        }
        .scan-overlay {
            position: absolute;
            width: 350px;
            height: 350px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.7);
        }
        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: #10b981;
            top: 0;
            left: 0;
            box-shadow: 0 0 15px 2px #10b981;
            animation: scan 3s linear infinite;
        }
        @keyframes scan {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        #resultToast {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface-color);
            color: var(--text-main);
            padding: 1rem 2rem;
            border-radius: 99px;
            box-shadow: var(--shadow-lg);
            font-weight: 600;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 20;
        }
        #resultToast.show {
            bottom: 40px;
        }
        .success-icon { color: var(--success); }
        .error-icon { color: var(--danger); }
        .btn-exit {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            text-decoration: none;
            backdrop-filter: blur(5px);
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="scanner-container">
        <div class="top-bar">
            <div>
                <h1 style="font-size: 1.5rem; margin: 0; display: flex; align-items: center; gap: 0.5rem;">
                    <div style="width: 12px; height: 12px; background: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981;"></div>
                    SmartFace Kiosk Active
                </h1>
                <p style="margin: 0; color: #aaa; text-align: left; font-size: 0.9rem;">Please look at the camera</p>
            </div>
            <a href="{{ url_for('admin_dashboard') }}" class="btn-exit">Exit Kiosk</a>
        </div>

        <div class="vid-wrapper">
            <video id="scanVideo" autoplay muted playsinline></video>
            <div class="scan-overlay">
                <div class="scan-line"></div>
            </div>
        </div>
    </div>

    <div id="resultToast">
        <span id="toastIcon"></span>
        <span id="toastMsg">Detecting...</span>
    </div>

    <script src="{{ url_for('static', filename='js/camera.js') }}"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            startCamera("scanVideo");

            let isProcessing = false;

            function showToast(msg, isSuccess) {
                const toast = document.getElementById("resultToast");
                const icon = document.getElementById("toastIcon");
                const toastMsg = document.getElementById("toastMsg");

                toastMsg.innerText = msg;
                if (isSuccess) {
                    icon.className = "success-icon";
                    icon.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
                } else {
                    icon.className = "error-icon";
                    icon.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>';
                }

                toast.classList.add("show");
                
                setTimeout(() => {
                    toast.classList.remove("show");
                    isProcessing = false;
                }, 3500);
            }

            async function scanLoop() {
                if (!isProcessing) {
                    isProcessing = true;
                    const base64Img = captureFrame("scanVideo");
                    
                    try {
                        const response = await fetch("{{ url_for('api_recognize_face') }}", {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ image: base64Img })
                        });
                        const result = await response.json();
                        
                        if (result.success) {
                            showToast(result.msg, true);
                        } else {
                            // If no face found or not recognized, just loop silently or show error quietly
                            // To prevent spamming "Face not recognized", only show it sometimes or just keep scanning
                            // Let's keep scanning until a success.
                            isProcessing = false; // release lock immediately to try again
                        }
                    } catch (err) {
                        console.error(err);
                        isProcessing = false;
                    }
                }
                
                // Keep calling scan
                setTimeout(scanLoop, 1500); 
            }

            // Start scanning loop after a short delay to let camera initialize
            setTimeout(scanLoop, 2000);
        });
    </script>
</body>
</html>
