<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Scanner - SmartFace</title>
    <!-- Particles.js -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800&display=swap');
        body {
            background-color: #040914;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            margin: 0;
            font-family: 'Outfit', sans-serif;
        }
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .scanner-container {
            z-index: 5;
            text-align: center;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .top-bar {
            padding: 2rem 4rem;
            position: absolute;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(4, 9, 20, 0.95), transparent);
            z-index: 10;
        }
        .vid-wrapper {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 720px;
            height: 540px;
            background: rgba(4, 9, 20, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            box-shadow: 0 0 50px rgba(59, 130, 246, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        video {
            height: 100%;
            width: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            filter: contrast(1.1) brightness(0.9);
            border-radius: 20px;
        }
        
        /* High-tech HUD Brackets */
        .hud-brackets {
            position: absolute;
            width: 400px;
            height: 400px;
            border: 2px solid transparent;
            z-index: 20;
            pointer-events: none;
        }
        .hud-brackets::before, .hud-brackets::after {
            content: '';
            position: absolute;
            width: 40px; height: 40px;
            border-color: #3b82f6;
            border-style: solid;
            transition: all 0.3s;
        }
        .hud-brackets::before {
            top: 0; left: 0;
            border-width: 4px 0 0 4px;
        }
        .hud-brackets::after {
            bottom: 0; right: 0;
            border-width: 0 4px 4px 0;
        }
        .hud-brackets .tr-bl::before, .hud-brackets .tr-bl::after {
            content: '';
            position: absolute;
            width: 40px; height: 40px;
            border-color: #3b82f6;
            border-style: solid;
            transition: all 0.3s;
        }
        .hud-brackets .tr-bl::before {
            top: 0; right: 0;
            border-width: 4px 4px 0 0;
        }
        .hud-brackets .tr-bl::after {
            bottom: 0; left: 0;
            border-width: 0 0 4px 4px;
        }
        
        .hud-brackets.locked::before, .hud-brackets.locked::after,
        .hud-brackets.locked .tr-bl::before, .hud-brackets.locked .tr-bl::after {
            border-color: #10b981;
            box-shadow: 0 0 15px #10b981;
            transform: scale(0.9);
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: rgba(59, 130, 246, 0.8);
            top: 0; left: 0;
            box-shadow: 0 0 20px 4px rgba(59, 130, 246, 0.5);
            animation: scan 3s ease-in-out infinite alternate;
        }
        .hud-brackets.locked .scan-line {
            background: rgba(16, 185, 129, 0.8);
            box-shadow: 0 0 20px 4px rgba(16, 185, 129, 0.5);
        }
        
        @keyframes scan {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        
        #statusText {
            margin-top: 1rem;
            font-size: 1.2rem;
            font-weight: 500;
            color: #9ca3af;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        .btn-exit {
            background: rgba(255,255,255,0.05);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.15);
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            text-decoration: none;
            backdrop-filter: blur(5px);
            font-weight: 600;
            transition: all 0.3s;
            pointer-events: auto; /* Since particles take bg */
        }
        .btn-exit:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.5);
        }
        
        .pulsing-indicator {
            width: 14px; height: 14px;
            background: #3b82f6;
            border-radius: 50%;
            box-shadow: 0 0 15px #3b82f6;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    
    <div class="scanner-container">
        <div class="top-bar">
            <div>
                <h1 style="font-size: 1.8rem; margin: 0; display: flex; align-items: center; gap: 1rem; color: #fff;">
                    <div class="pulsing-indicator" id="topIndicator"></div>
                    Facial Recognition Gateway
                </h1>
                <p id="topSubtext" style="margin: 0.5rem 0 0 2rem; color: #9ca3af; text-align: left; font-size: 1rem;">Liveness Detection Active - Anti-Spoofing Enabled</p>
            </div>
            <a href="{{ url_for('admin_dashboard') }}" class="btn-exit" style="z-index:100;">Exit Secure Kiosk</a>
        </div>

        <div class="vid-wrapper">
            <video id="scanVideo" autoplay muted playsinline></video>
            <div class="hud-brackets" id="brackets">
                <div class="tr-bl"></div>
                <div class="scan-line"></div>
            </div>
        </div>
        
        <div style="position: absolute; bottom: 8%; width: 100%; text-align: center;">
            <div id="statusText">Awaiting Subject Alignment...</div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/camera.js') }}"></script>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#3b82f6" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.3, "random": false },
                "size": { "value": 3, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#3b82f6", "opacity": 0.2, "width": 1 },
                "move": { "enable": true, "speed": 2, "direction": "none", "random": false, "straight": false, "out_mode": "out", "bounce": false }
            },
            "interactivity": { "detect_on": "canvas", "events": { "onhover": { "enable": true, "mode": "grab" }, "onclick": { "enable": false }, "resize": true } },
            "retina_detect": true
        });

        document.addEventListener("DOMContentLoaded", () => {
            startCamera("scanVideo");

            let isProcessing = false;
            let blinkDetected = false;
            let eyesWereClosed = false;
            let currentSubject = null;

            const brackets = document.getElementById("brackets");
            const statusText = document.getElementById("statusText");
            const topIndicator = document.getElementById("topIndicator");

            function resetScanner() {
                blinkDetected = false;
                eyesWereClosed = false;
                currentSubject = null;
                brackets.className = "hud-brackets";
                statusText.innerText = "Awaiting Subject Alignment...";
                statusText.style.color = "#9ca3af";
                topIndicator.style.background = "#3b82f6";
                topIndicator.style.boxShadow = "0 0 15px #3b82f6";
            }

            async function scanLoop() {
                if (!isProcessing) {
                    isProcessing = true;
                    const base64Img = captureFrame("scanVideo");
                    
                    try {
                        const response = await fetch("{{ url_for('api_recognize_face') }}", {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ 
                                image: base64Img,
                                liveness_verified: blinkDetected 
                            })
                        });
                        const result = await response.json();
                        
                        if (result.recognized) {
                            brackets.classList.add("locked");
                            
                            if (!blinkDetected) {
                                // Enforce Blink
                                statusText.innerText = result.msg; 
                                statusText.style.color = "#f59e0b"; // Warning/Action color
                                
                                if (!result.has_eyes) {
                                    eyesWereClosed = true;
                                } else if (eyesWereClosed && result.has_eyes) {
                                    blinkDetected = true;
                                    statusText.innerText = "Liveness Verified. Verifying Identity...";
                                    statusText.style.color = "#10b981";
                                }
                            } else if (result.success) {
                                // Final Success
                                statusText.innerText = result.msg;
                                statusText.style.color = "#10b981";
                                topIndicator.style.background = "#10b981";
                                topIndicator.style.boxShadow = "0 0 15px #10b981";
                                
                                // Pause for a generic amount of time to let user read success
                                setTimeout(() => {
                                    resetScanner();
                                    isProcessing = false;
                                    setTimeout(scanLoop, 500); 
                                }, 4000);
                                return; // stop looping temporarily
                            }
                        } else {
                            resetScanner(); // subject left frame or unidentified
                            statusText.innerText = result.msg; // Analyzing facial geometry...
                        }
                    } catch (err) {
                        console.error(err);
                    }
                    isProcessing = false;
                }
                setTimeout(scanLoop, 600); 
            }

            setTimeout(scanLoop, 2000);
        });
    </script>
</body>
</html>
